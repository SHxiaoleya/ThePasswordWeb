<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>密码管理器（加密版）</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🔐 密码管理器（加密版）</h1>

    <!-- 解锁卡片 -->
    <section class="card" id="authCard">
      <h2 id="authTitle">解锁密码库</h2>
      <p class="tip" id="authTip">请输入主密码解锁。</p>

      <div class="form-row">
        <label for="masterPassword">主密码</label>
        <input id="masterPassword" type="password" placeholder="请输入主密码" />
      </div>

      <div class="form-row hidden" id="confirmRow">
        <label for="masterPasswordConfirm">确认主密码</label>
        <input id="masterPasswordConfirm" type="password" placeholder="请再次输入主密码" />
      </div>

      <div class="form-actions">
        <button id="authBtn">解锁</button>
      </div>
    </section>

    <!-- 主应用 -->
    <div id="appArea" class="hidden">
      <section class="card topbar">
        <div>
          <strong>状态：</strong><span id="vaultStatus">已解锁</span>
        </div>
        <button id="lockBtn" class="secondary">锁定</button>
      </section>

      <!-- 表单区域 -->
      <section class="card">
        <h2 id="formTitle">添加密码</h2>
        <form id="passwordForm">
          <input type="hidden" id="editId" />

          <div class="form-row">
            <label for="name">名称 *</label>
            <input id="name" type="text" placeholder="例如：GitHub / 微信" required />
          </div>

          <div class="form-row">
            <label for="account">账号 *</label>
            <input id="account" type="text" placeholder="邮箱 / 用户名 / 手机号" required />
          </div>

          <div class="form-row">
            <label for="password">密码 *</label>
            <div class="password-input-wrap">
              <input id="password" type="text" placeholder="请输入密码" required />
              <button type="button" id="genPasswordBtn" class="secondary">随机强密码</button>
            </div>
          </div>

          <div class="form-row">
            <label for="note">备注</label>
            <textarea id="note" rows="2" placeholder="可选备注"></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" id="saveBtn">保存</button>
            <button type="button" id="cancelEditBtn" class="secondary hidden">取消编辑</button>
          </div>
        </form>
      </section>

      <!-- 搜索 -->
      <section class="card">
        <h2>搜索</h2>
        <input id="searchInput" type="text" placeholder="输入名称/账号/备注进行搜索..." />
      </section>

      <!-- 列表 -->
      <section class="card">
        <h2>密码列表</h2>
        <div id="listContainer" class="list"></div>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
